function seededRandom(s){let x=s;return()=>{x=(x*16807)%2147483647;return(x-1)/2147483646};}
function dateSeed(d){const dt=new Date(d);return dt.getFullYear()*10000+(dt.getMonth()+1)*100+dt.getDate();}
function getSplit(d){if(d<=2)return{label:"Full Body",schedule:Array(d).fill("full")};if(d===3)return{label:"Full Body",schedule:["full","full","full"]};if(d===4)return{label:"Upper / Lower",schedule:["upper","lower","upper","lower"]};if(d===5)return{label:"Push / Pull / Legs",schedule:["push","pull","legs","upper","lower"]};if(d===6)return{label:"Push / Pull / Legs",schedule:["push","pull","legs","push","pull","legs"]};return{label:"PPL + Full",schedule:["push","pull","legs","push","pull","legs","full"]};}
function pick(list,n,rng){return[...list].sort(()=>rng()-0.5).slice(0,n);}
function filt(list,avoid){return avoid.length?list.filter(e=>!e.avoid.some(a=>avoid.includes(a))):list;}
function getCatForSlot(dayType,idx){const m={full:["upper_push","upper_pull","lower_push","lower_pull","core"],upper:["upper_push","upper_push","upper_pull","upper_pull","core"],push:["upper_push","upper_push","upper_push","core"],pull:["upper_pull","upper_pull","upper_pull","core"],lower:["lower_push","lower_push","lower_pull","core"],legs:["lower_push","lower_push","lower_pull","core"]};return(m[dayType]||m.full)[idx]||"core";}
function gen(dayType,eq,avoid,rng,int,style){const db=EX[style]||EX.strength;const isH=style==="hiit"||style==="crossfit";let exs=[],wu=[];const g=(cat,n)=>pick(filt((db[cat]||{})[eq]||[],avoid),n,rng);if(dayType==="full"){wu=WARMUPS.full;exs=[...g("upper_push",1),...g("upper_pull",1),...g("lower_push",1),...g("lower_pull",1),...g("core",1)];}else if(dayType==="upper"){wu=WARMUPS.upper;exs=[...g("upper_push",2),...g("upper_pull",2),...g("core",1)];}else if(dayType==="push"){wu=WARMUPS.upper;exs=[...g("upper_push",3),...g("core",1)];}else if(dayType==="pull"){wu=WARMUPS.upper;exs=[...g("upper_pull",3),...g("core",1)];}else{wu=WARMUPS.lower;exs=[...g("lower_push",2),...g("lower_pull",1),...g("core",1)];}if(!exs.length)exs=[{name:"Bodyweight Circuit (Squats, Push-ups, Planks)",muscle:"Full Body",avoid:[]}];return{warmup:wu,exercises:exs.map(e=>({...e,sets:isH?int.rounds:int.sets,reps:isH?`${int.hiitWork}/${int.hiitRest}`:int.reps,rest:isH?"between rounds":int.rest,isHIIT:isH}))};}

            {INTENSITY_OPTIONS.map(o=>(<div key={o.id} onClick={()=>setIntLvl(o.id)} style={{flex:1,background:intLvl===o.id?"rgba(226,176,111,0.1)":C.card,border:intLvl===o.id?"1.5px solid rgba(226,176,111,0.45)":`1px solid ${C.bdr}`,borderRadius:14,padding:"12px 10px",cursor:"pointer",textAlign:"center",transition:"all 0.2s"}}><div style={{fontSize:14,fontWeight:600,color:intLvl===o.id?C.gold:C.t1}}>{o.label}</div><div style={{fontSize:10,color:C.t3,marginTop:3}}>{o.desc}</div></div>))}
          </div>
        </div>
        <div style={{padding:"14px 24px"}}>
          <h3 style={hdr(17)}>Equipment</h3>
          <div style={{display:"flex",flexDirection:"column",gap:8,marginTop:12}}>
            {EQUIPMENT_OPTIONS.map(o=>(<div key={o.id} onClick={()=>setEq(o.id)} style={{background:C.card,borderRadius:14,padding:"13px 16px",cursor:"pointer",border:equipment===o.id?"1.5px solid rgba(226,176,111,0.5)":`1px solid ${C.bdr}`,display:"flex",justifyContent:"space-between",alignItems:"center",transition:"all 0.2s"}}><div style={{display:"flex",gap:12,alignItems:"center"}}><span style={{fontSize:20}}>{o.icon}</span><div><div style={{fontSize:14,fontWeight:600,color:equipment===o.id?C.gold:C.t1}}>{o.label}</div><div style={{fontSize:11,color:C.t3}}>{o.desc}</div></div></div><div style={{width:20,height:20,borderRadius:"50%",border:equipment===o.id?`2px solid ${C.gold}`:"2px solid rgba(255,255,255,0.15)",display:"flex",alignItems:"center",justifyContent:"center"}}>{equipment===o.id&&<div style={{width:10,height:10,borderRadius:"50%",background:C.gold}}/>}</div></div>))}
          </div>
        </div>
        <div style={{padding:"10px 24px"}}>
          <h3 style={hdr(17)}>Aches or Areas to Avoid</h3>
          <p style={{fontSize:11,color:C.t3,marginBottom:12,marginTop:4}}>Tap any areas that are sore today</p>
          <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
            {BODY_AREAS.map(a=>(<div key={a} onClick={()=>setAches(p=>p.includes(a)?p.filter(x=>x!==a):[...p,a])} style={{padding:"8px 14px",borderRadius:24,cursor:"pointer",fontSize:13,fontWeight:500,border:aches.includes(a)?`1.5px solid ${C.gold}`:"1.5px solid rgba(255,255,255,0.12)",background:aches.includes(a)?"rgba(226,176,111,0.15)":"rgba(255,255,255,0.03)",color:aches.includes(a)?C.gold:C.t2,transition:"all 0.2s",userSelect:"none"}}>{a}</div>))}
          </div>
        </div>
        <div style={{padding:"20px 24px 0"}}>
          <button onClick={handleGenerate} style={{display:"block",width:"100%",padding:16,borderRadius:14,border:"none",background:`linear-gradient(135deg,${C.gold},#c4903f)`,color:C.bg,fontFamily:"'Playfair Display',serif",fontSize:18,cursor:"pointer",boxShadow:"0 4px 20px rgba(226,176,111,0.25)"}}>Generate My Program</button>
        </div>
      </div>
    );
  }

  return(
    <div style={base}>
      {modal&&<VideoModal exercise={modal} onClose={()=>setModal(null)}/>}
      <div style={{padding:"28px 24px 16px",textAlign:"center",borderBottom:`1px solid ${C.bdr}`}}>
        <h1 style={hdr(22)}>Martin Training</h1>
        <p style={{fontSize:11,color:C.t3,marginTop:4,textTransform:"uppercase",letterSpacing:1.5}}>{split.label} · {STYLE_OPTIONS.find(s=>s.id===style)?.label} · {days} Days</p>
      </div>
      <div style={{padding:"16px 24px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
          <button onClick={()=>setScreen("setup")} style={{background:"none",border:"1px solid rgba(255,255,255,0.15)",color:C.t2,padding:"8px 16px",borderRadius:10,cursor:"pointer",fontSize:13,fontWeight:500}}>← Settings</button>
          <button onClick={()=>{setSeed(s=>s+1);setExSeeds({});}} style={{background:"rgba(226,176,111,0.12)",border:"1px solid rgba(226,176,111,0.3)",color:C.gold,padding:"8px 16px",borderRadius:10,cursor:"pointer",fontSize:13,fontWeight:600}}>↻ Shuffle All</button>
        </div>
        <div style={{display:"flex",gap:8,overflowX:"auto",paddingBottom:4,marginBottom:8}}>
          {split.schedule.map((_,i)=>(<div key={i} onClick={()=>setCurDay(i)} style={{padding:"8px 14px",borderRadius:10,cursor:"pointer",whiteSpace:"nowrap",fontSize:12,fontWeight:600,background:curDay===i?"rgba(226,176,111,0.18)":C.card,border:curDay===i?"1px solid rgba(226,176,111,0.4)":`1px solid ${C.bdr}`,color:curDay===i?C.gold:C.t2,opacity:done.includes(i)?0.5:1,transition:"all 0.2s"}}>Day {i+1}{done.includes(i)?" ✓":""}</div>))}
        </div>
        <div style={{textAlign:"center",margin:"12px 0"}}>
          <span style={{fontFamily:"'Playfair Display',serif",fontSize:24,color:C.t1}}>{DAYLBL[dayType]}</span>
          <div style={{display:"flex",justifyContent:"center",gap:10,flexWrap:"wrap",marginTop:10}}>
            <span style={bdg("rgba(226,176,111,0.12)",C.gold)}>~30 min</span>
            <span style={bdg("rgba(226,176,111,0.12)",C.gold)}>{workout.exercises[0]?.isHIIT?`${int.rounds} rounds`:`${int.sets}×${int.reps}`}</span>
            <span style={bdg("rgba(125,216,160,0.12)",C.green)}>{intLvl}</span>
          </div>
          {aches.length>0&&<div style={{marginTop:8,fontSize:12,color:C.t3}}>Avoiding: {aches.join(", ")}</div>}
        </div>
        <div style={{background:C.card,borderRadius:14,border:`1px solid ${C.bdr}`,padding:16,marginTop:10,marginBottom:12}}>
          <div style={{fontSize:12,fontWeight:700,color:C.gold,textTransform:"uppercase",letterSpacing:1,marginBottom:6}}>Warm-Up · 3 min</div>
          {workout.warmup.map((w,i)=>(<div key={i} style={{display:"flex",justifyContent:"space-between",padding:"7px 0",fontSize:13,color:C.t2,borderBottom:i<workout.warmup.length-1?"1px solid rgba(255,255,255,0.03)":"none"}}><span>{w.name}</span><span style={{color:C.t3}}>{w.duration}</span></div>))}
        </div>
        <div style={{background:C.card,borderRadius:14,border:`1px solid ${C.bdr}`,padding:16,position:"relative"}}>
          <div style={{fontSize:12,fontWeight:700,color:C.gold,textTransform:"uppercase",letterSpacing:1,marginBottom:4}}>Main Workout</div>
          <div style={{fontSize:11,color:C.t3,marginBottom:10}}>Tap exercise for video & form cues · ↻ to swap</div>
          {workout.exercises.map((ex,i)=>(<div key={`${curDay}-${i}-${ex.name}`} style={{display:"flex",alignItems:"center",padding:"11px 0",borderBottom:i<workout.exercises.length-1?"1px solid rgba(255,255,255,0.05)":"none",gap:8}}>
            <button onClick={e=>{e.stopPropagation();shuffleSingle(i);}} style={{background:"rgba(226,176,111,0.06)",border:"1px solid rgba(226,176,111,0.18)",color:C.gold,width:32,height:32,borderRadius:8,cursor:"pointer",fontSize:14,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>↻</button>
            <div onClick={()=>setModal(ex)} style={{flex:1,cursor:"pointer",minWidth:0}}>
              <div style={{fontSize:14,fontWeight:500,color:C.t1,display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}><span>{ex.name}</span><span style={{fontSize:9,color:"#fff",background:"rgba(220,40,40,0.75)",padding:"2px 7px",borderRadius:4,fontWeight:700,flexShrink:0}}>▶ VIDEO</span></div>
              <div style={{fontSize:12,color:C.t3,marginTop:2}}>{ex.muscle}</div>
            </div>
            <div style={{textAlign:"right",fontSize:13,color:C.gold,fontWeight:600,whiteSpace:"nowrap",flexShrink:0}}>{ex.sets}×{ex.reps}<div style={{fontSize:10,color:C.t3,fontWeight:400}}>rest {ex.rest}</div></div>
          </div>))}
          {done.includes(curDay)&&<div style={{position:"absolute",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.5)",borderRadius:14,display:"flex",alignItems:"center",justifyContent:"center",color:C.green,fontFamily:"'Playfair Display',serif",fontSize:20}}>✓ Completed</div>}
        </div>
        {!done.includes(curDay)&&(<button onClick={()=>setDone(p=>[...p,curDay])} style={{display:"block",width:"100%",padding:16,borderRadius:14,border:"none",background:`linear-gradient(135deg,${C.green},#4caf6e)`,color:C.bg,fontFamily:"'Playfair Display',serif",fontSize:18,cursor:"pointer",boxShadow:"0 4px 20px rgba(125,216,160,0.2)",marginTop:12}}>Mark Day Complete ✓</button>)}
        <div style={{textAlign:"center",marginTop:20,fontSize:12,color:C.t3}}>{done.length} of {days} workouts completed this week</div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
